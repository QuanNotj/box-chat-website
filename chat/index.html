<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <title>Box Chat By Vaq</title>

  <style>
    :root {
      color-scheme: dark;
      --bg: #101113;
      --panel: #181a1d;
      --panel-2: #202329;
      --panel-3: #262a31;
      --text: #f5f7fb;
      --muted: #a5adba;
      --border: #323743;
      --accent: #22c55e;
      --accent-2: #0ea5e9;
      --danger: #ef4444;
      --warning: #f59e0b;
      --shadow: 0 18px 50px rgba(0, 0, 0, .22);
    }

    [data-theme="light"] {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --panel-2: #eef2f6;
      --panel-3: #e4e9ef;
      --text: #171a1f;
      --muted: #5f6978;
      --border: #d6dde7;
      --shadow: 0 18px 46px rgba(38, 49, 67, .13);
    }

    [data-theme="neon"] {
      color-scheme: dark;
      --bg: #080a12;
      --panel: #111322;
      --panel-2: #191d33;
      --panel-3: #222849;
      --text: #f7f7ff;
      --muted: #a9b2d6;
      --border: #343b67;
      --accent: #22d3ee;
      --accent-2: #f472b6;
      --warning: #fde047;
      --shadow: 0 20px 58px rgba(34, 211, 238, .16);
    }

    [data-theme="glass"] {
      color-scheme: dark;
      --bg: #0d1218;
      --panel: rgba(21, 28, 38, .78);
      --panel-2: rgba(33, 42, 55, .72);
      --panel-3: rgba(46, 58, 74, .78);
      --text: #f5f9ff;
      --muted: #a9b6c7;
      --border: rgba(151, 169, 196, .24);
      --accent: #7dd3fc;
      --accent-2: #86efac;
      --shadow: 0 22px 62px rgba(0, 0, 0, .34);
    }

    [data-theme="minimal"] {
      color-scheme: light;
      --bg: #f7f7f5;
      --panel: #ffffff;
      --panel-2: #eeeeeb;
      --panel-3: #e2e2de;
      --text: #202124;
      --muted: #676b73;
      --border: #d9d9d3;
      --accent: #111827;
      --accent-2: #2563eb;
      --warning: #d97706;
      --shadow: 0 14px 38px rgba(24, 24, 27, .09);
    }

    [data-theme="cyber"] {
      color-scheme: dark;
      --bg: #05080b;
      --panel: #101820;
      --panel-2: #15222d;
      --panel-3: #1f3340;
      --text: #effff8;
      --muted: #99b9b0;
      --border: #24414d;
      --accent: #39ff88;
      --accent-2: #00d4ff;
      --warning: #facc15;
      --shadow: 0 18px 54px rgba(57, 255, 136, .14);
    }

    [data-theme="light-clean"] {
      color-scheme: light;
      --bg: #f8fafc;
      --panel: #ffffff;
      --panel-2: #f1f5f9;
      --panel-3: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe3ee;
      --accent: #0ea5e9;
      --accent-2: #22c55e;
      --warning: #f59e0b;
      --shadow: 0 16px 42px rgba(15, 23, 42, .11);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
      overflow: hidden;
    }

    [data-theme="glass"] body,
    body[data-theme="glass"] {
      backdrop-filter: blur(18px);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .58;
    }

    .hidden {
      display: none !important;
    }

    .login-screen {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .login-card {
      width: min(420px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font-weight: 800;
    }

    .brand h1 {
      font-size: 22px;
      line-height: 1.2;
      margin: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 16px 0 4px;
      padding: 4px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .auth-tab {
      height: 36px;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-weight: 750;
    }

    .auth-tab.active {
      background: var(--panel);
      color: var(--text);
      box-shadow: 0 1px 8px rgba(0, 0, 0, .08);
    }

    .auth-hint {
      min-height: 18px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-top: 14px;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      outline: none;
      transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }

    input,
    select {
      height: 44px;
      padding: 0 12px;
    }

    select {
      appearance: none;
    }

    textarea {
      min-height: 44px;
      max-height: 140px;
      resize: none;
      padding: 11px 12px;
      line-height: 1.45;
    }

    input:focus,
    textarea:focus {
      border-color: color-mix(in srgb, var(--accent) 72%, var(--border));
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    input[type="color"] {
      flex: 0 0 52px;
      padding: 4px;
    }

    .primary-btn,
    .ghost-btn,
    .danger-btn,
    .icon-btn {
      height: 40px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }

    .primary-btn {
      width: 100%;
      margin-top: 18px;
      background: var(--accent);
      color: #06220f;
      font-weight: 750;
      padding: 0 16px;
    }

    .ghost-btn,
    .icon-btn {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .ghost-btn {
      padding: 0 12px;
    }

    .danger-btn {
      background: color-mix(in srgb, var(--danger) 18%, var(--panel-2));
      color: var(--text);
      border: 1px solid color-mix(in srgb, var(--danger) 42%, var(--border));
      padding: 0 12px;
    }

    .icon-btn {
      width: 40px;
      flex: 0 0 40px;
      font-weight: 750;
    }

    .icon-btn.has-badge {
      width: auto;
      flex-basis: auto;
      min-width: 58px;
      padding: 0 10px;
      background: var(--warning);
      border-color: color-mix(in srgb, var(--warning) 72%, var(--border));
      color: #111827;
      font-size: 12px;
    }

    .app-shell {
      height: 100dvh;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 290px;
      background: var(--bg);
      overflow: hidden;
    }

    .chat-main {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      border-right: 1px solid var(--border);
    }

    .topbar {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      background: color-mix(in srgb, var(--panel) 94%, transparent);
      border-bottom: 1px solid var(--border);
    }

    .room-title {
      min-width: 0;
    }

    .room-title h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .room-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--warning);
    }

    .status-dot.online {
      background: var(--accent);
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .searchbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      padding: 10px 18px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }

    .searchbar input {
      height: 40px;
    }

    .typing-row {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
      padding: 0 18px 7px;
      background: var(--panel);
    }

    .pin-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 42px;
      padding: 8px 18px;
      background: color-mix(in srgb, var(--warning) 14%, var(--panel));
      border-bottom: 1px solid color-mix(in srgb, var(--warning) 38%, var(--border));
      color: var(--text);
      font-size: 13px;
    }

    .pin-bar span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .messages {
      min-height: 0;
      list-style: none;
      margin: 0;
      padding: 16px 18px 22px;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .history-status {
      min-height: 34px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
      padding: 4px 0 12px;
    }

    .unread-separator {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0;
      color: var(--warning);
      font-size: 12px;
      font-weight: 850;
    }

    .unread-separator::before,
    .unread-separator::after {
      content: "";
      height: 1px;
      flex: 1;
      background: color-mix(in srgb, var(--warning) 48%, var(--border));
    }

    .blocked-message {
      display: flex;
      justify-content: center;
      margin: 0 0 10px;
    }

    .blocked-notice {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: min(420px, 100%);
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
    }

    .message {
      --action-space: 42px;
      display: flex;
      align-items: flex-start;
      gap: 9px;
      margin: 0 0 10px;
      animation: messageIn .16s ease-out;
      transition: margin-bottom .16s ease;
    }

    .message.mine {
      flex-direction: row-reverse;
    }

    .message.has-actions:hover,
    .message.has-actions:focus-within,
    .message.actions-open {
      margin-bottom: var(--action-space);
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--panel-3);
      flex: 0 0 36px;
    }

    .profile-trigger {
      cursor: pointer;
    }

    .profile-trigger:hover {
      filter: brightness(1.08);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .message > .avatar {
      margin-top: 22px;
      transition: transform .16s ease;
    }

    .bubble-wrap {
      position: relative;
      min-width: 0;
      max-width: min(680px, 74%);
      display: grid;
      gap: 5px;
      transition: transform .16s ease;
    }

    .message.has-actions:hover > .avatar,
    .message.has-actions:hover .bubble-wrap,
    .message.has-actions:focus-within > .avatar,
    .message.has-actions:focus-within .bubble-wrap,
    .message.actions-open > .avatar,
    .message.actions-open .bubble-wrap {
      transform: translateY(-6px);
    }

    .message.mine .bubble-wrap {
      justify-items: end;
    }

    .bubble {
      width: fit-content;
      max-width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 11px;
      overflow-wrap: anywhere;
      line-height: 1.45;
    }

    .message-text:not(:empty) {
      margin-bottom: 7px;
    }

    .message-image {
      display: block;
      width: min(320px, 100%);
      max-height: 360px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel-3);
    }

    .link-preview {
      width: min(420px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      margin-top: 7px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      text-decoration: none;
    }

    .link-preview:hover {
      border-color: color-mix(in srgb, var(--accent-2) 48%, var(--border));
      background: var(--panel-3);
    }

    .link-preview-main {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .link-preview-host,
    .link-preview-title,
    .link-preview-desc {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-preview-host {
      color: var(--accent-2);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .link-preview-title {
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .link-preview-desc {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .link-preview img {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 8px;
      background: var(--panel-3);
    }

    .mention {
      display: inline;
      border-radius: 5px;
      padding: 0 3px;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 14%, transparent);
      font-weight: 800;
    }

    .mention.self {
      color: #111827;
      background: var(--warning);
    }

    .message.mine .bubble {
      background: color-mix(in srgb, var(--accent) 18%, var(--panel));
      border-color: color-mix(in srgb, var(--accent) 34%, var(--border));
    }

    .message.mentioned .bubble {
      border-color: color-mix(in srgb, var(--warning) 70%, var(--border));
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--warning) 16%, transparent);
    }

    .message.jump-highlight .bubble {
      border-color: color-mix(in srgb, var(--accent-2) 82%, var(--border));
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent-2) 22%, transparent);
    }

    .message.deleted .bubble {
      color: var(--muted);
      font-style: italic;
    }

    .reply-preview {
      width: 100%;
      border-left: 3px solid var(--accent-2);
      color: var(--muted);
      background: var(--panel-2);
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    button.reply-preview {
      display: block;
      text-align: left;
      cursor: pointer;
    }

    button.reply-preview:hover {
      color: var(--text);
      background: var(--panel-3);
    }

    .message-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      flex-wrap: wrap;
    }

    .edited-badge {
      display: block;
      height: auto;
      min-width: 0;
      margin-top: 4px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      text-align: left;
    }

    .edited-badge:hover {
      color: var(--accent-2);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .name {
      font-weight: 750;
    }

    .actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .message-actions {
      position: absolute;
      top: calc(100% + 7px);
      left: 0;
      z-index: 8;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      width: max-content;
      max-width: min(560px, calc(100vw - 86px));
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity .16s ease, transform .16s ease;
    }

    .message.mine .message-actions {
      left: auto;
      right: 0;
      justify-content: flex-end;
    }

    .message:focus-within .message-actions,
    .message:hover .message-actions,
    .message.actions-open .message-actions {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .reaction-actions {
      position: relative;
      overflow: visible;
      order: 2;
    }

    .menu-actions {
      order: 1;
      width: max-content;
      max-width: 100%;
    }

    .action-btn {
      min-width: 30px;
      height: 28px;
      padding: 0 8px;
      border-radius: 7px;
      background: var(--panel-2);
      color: var(--muted);
      border: 1px solid var(--border);
      font-size: 12px;
    }

    .action-btn:hover {
      color: var(--text);
    }

    .reaction-toggle {
      min-width: 54px;
    }

    .reaction-picker {
      position: absolute;
      left: 0;
      bottom: 34px;
      z-index: 12;
      width: 236px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .message.mine .reaction-picker {
      left: auto;
      right: 0;
    }

    .reaction-picker button {
      width: 38px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      font-size: 18px;
      line-height: 1;
    }

    .reaction-picker button:hover {
      background: var(--panel-3);
      border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
    }

    .reaction-row {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .reaction-chip {
      min-width: 34px;
      height: 26px;
      padding: 0 7px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      font-size: 12px;
    }

    .composer {
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 10px 18px 14px;
    }

    .image-preview {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .image-preview-main {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .image-preview img {
      width: 54px;
      height: 54px;
      object-fit: cover;
      border-radius: 8px;
      background: var(--panel-3);
    }

    .image-preview strong,
    .image-preview span {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .image-preview strong {
      font-size: 13px;
    }

    .image-preview span {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .reply-bar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 13px;
    }

    .reply-bar strong {
      color: var(--text);
    }

    .composer-form {
      display: grid;
      grid-template-columns: auto auto auto minmax(0, 1fr) auto;
      gap: 8px;
      align-items: end;
    }

    .send-btn {
      height: 44px;
      min-width: 82px;
      border-radius: 8px;
      background: var(--accent);
      color: #06220f;
      font-weight: 800;
      padding: 0 16px;
    }

    .composer-foot {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .emoji-panel {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .emoji-panel button {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      font-size: 18px;
    }

    .sidebar {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: var(--panel);
      overflow: hidden;
    }

    .sidebar-head,
    .profile-box {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-head h3 {
      margin: 0;
      font-size: 15px;
    }

    .users {
      list-style: none;
      margin: 0;
      padding: 10px;
      overflow-y: auto;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 46px;
      padding: 7px;
      border-radius: 8px;
    }

    .user-actions {
      margin-left: auto;
      display: flex;
      gap: 4px;
    }

    .user-item:hover {
      background: var(--panel-2);
    }

    .user-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 650;
    }

    .user-info {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .user-presence {
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .presence-dot {
      width: 7px;
      height: 7px;
      flex: 0 0 7px;
      border-radius: 999px;
      background: var(--muted);
    }

    .presence-dot.active {
      background: var(--accent);
    }

    .presence-dot.busy {
      background: var(--danger);
    }

    .presence-dot.gaming {
      background: var(--accent-2);
    }

    .presence-dot.offline,
    .presence-dot.invisible {
      background: var(--muted);
    }

    .admin-pill {
      color: #111827;
      background: var(--warning);
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 800;
    }

    .blocked-pill {
      color: var(--text);
      background: color-mix(in srgb, var(--danger) 24%, var(--panel-2));
      border: 1px solid color-mix(in srgb, var(--danger) 44%, var(--border));
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 800;
    }

    .profile-box {
      border-top: 1px solid var(--border);
      border-bottom: 0;
      display: grid;
      gap: 10px;
    }

    .profile-mini {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .profile-mini div {
      min-width: 0;
    }

    .profile-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 750;
    }

    .profile-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      max-width: min(520px, calc(100vw - 28px));
      padding: 10px 12px;
      border-radius: 8px;
      background: #111827;
      color: #fff;
      box-shadow: var(--shadow);
      z-index: 20;
      font-size: 14px;
    }

    .modal-root {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: color-mix(in srgb, #020617 68%, transparent);
      backdrop-filter: blur(14px);
    }

    .modal-panel {
      position: relative;
      width: min(460px, 100%);
      max-height: min(86dvh, 760px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--border) 82%, var(--accent));
      border-radius: 8px;
      background: color-mix(in srgb, var(--panel) 96%, #000);
      box-shadow: 0 26px 90px rgba(0, 0, 0, .42);
      animation: modalIn .16s ease-out;
    }

    .modal-panel.large {
      width: min(660px, 100%);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel-2) 42%, transparent);
    }

    .modal-kicker {
      margin: 0 0 5px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .modal-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .modal-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .modal-close {
      width: 34px;
      height: 34px;
      flex: 0 0 34px;
      border-radius: 8px;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--border);
      font-size: 20px;
      line-height: 1;
    }

    .modal-close:hover {
      color: var(--text);
      background: var(--panel-3);
    }

    .modal-body {
      min-height: 0;
      overflow-y: auto;
      display: grid;
      gap: 14px;
      padding: 16px 18px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      padding: 14px 18px 18px;
      border-top: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 88%, transparent);
    }

    .modal-confirm {
      width: auto;
      margin-top: 0;
    }

    .modal-confirm.danger {
      background: var(--danger);
      color: #fff;
    }

    .modal-error {
      min-height: 18px;
      margin: 0 auto 0 0;
      color: #fca5a5;
      font-size: 13px;
    }

    .modal-field {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .modal-field span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .modal-field textarea {
      min-height: 112px;
    }

    .modal-note {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .settings-preview {
      display: grid;
      gap: 8px;
      justify-items: center;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .settings-preview-banner {
      width: 100%;
      aspect-ratio: 16 / 7;
      border-radius: 8px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 38%, transparent), transparent 58%),
        var(--panel-3);
      background-size: cover;
      background-position: center;
    }

    .settings-preview .avatar {
      width: 66px;
      height: 66px;
      border-radius: 8px;
    }

    .settings-preview span {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 800;
    }

    .settings-fields {
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .settings-row {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 10px;
      align-items: end;
    }

    .settings-toggle {
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--text);
      font-size: 14px;
      font-weight: 750;
      user-select: none;
    }

    .settings-toggle input {
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(138px, 1fr));
      gap: 10px;
    }

    .theme-card {
      display: grid;
      gap: 9px;
      min-width: 0;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      text-align: left;
    }

    .theme-card.active {
      border-color: color-mix(in srgb, var(--accent) 72%, var(--border));
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    .theme-swatch {
      height: 54px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .theme-card strong,
    .theme-card span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .theme-card strong {
      font-size: 13px;
    }

    .theme-card span {
      color: var(--muted);
      font-size: 12px;
    }

    .password-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .profile-card {
      display: grid;
      gap: 0;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .profile-banner {
      min-height: 150px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 38%, transparent), transparent 52%),
        var(--panel-3);
      background-size: cover;
      background-position: center;
    }

    .profile-content {
      display: grid;
      gap: 10px;
      padding: 0 16px 16px;
    }

    .profile-main {
      display: flex;
      align-items: end;
      gap: 12px;
      margin-top: -34px;
      min-width: 0;
    }

    .profile-main .avatar {
      width: 76px;
      height: 76px;
      border: 3px solid var(--panel-2);
      border-radius: 8px;
    }

    .profile-main h4 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    .profile-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .profile-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--muted);
    }

    .profile-status-dot.online,
    .profile-status-dot.active {
      background: var(--accent);
    }

    .profile-status-dot.busy {
      background: var(--danger);
    }

    .profile-status-dot.gaming {
      background: var(--accent-2);
    }

    .profile-status-dot.offline,
    .profile-status-dot.invisible {
      background: var(--muted);
    }

    .profile-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .profile-stat {
      min-width: 0;
      padding: 9px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }

    .profile-stat strong,
    .profile-stat span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .profile-stat strong {
      font-size: 15px;
    }

    .profile-stat span {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .profile-bio {
      margin: 0;
      color: var(--text);
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .profile-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .hover-card {
      position: fixed;
      z-index: 90;
      width: min(280px, calc(100vw - 24px));
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--border) 82%, var(--accent-2));
      border-radius: 8px;
      background: color-mix(in srgb, var(--panel) 97%, #000);
      box-shadow: 0 18px 54px rgba(0, 0, 0, .36);
      pointer-events: auto;
    }

    .hover-card .profile-banner {
      min-height: 76px;
    }

    .hover-card-body {
      display: grid;
      gap: 8px;
      padding: 0 12px 12px;
    }

    .hover-card-main {
      display: flex;
      align-items: end;
      gap: 10px;
      min-width: 0;
      margin-top: -24px;
    }

    .hover-card .avatar {
      width: 56px;
      height: 56px;
      flex-basis: 56px;
      border: 2px solid var(--panel);
    }

    .hover-card h4 {
      margin: 0 0 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 16px;
    }

    .hover-card p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .hover-card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
    }

    .edit-history {
      display: grid;
      gap: 10px;
    }

    .edit-entry {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .edit-entry strong {
      color: var(--text);
      font-size: 13px;
    }

    .edit-entry pre {
      margin: 0;
      max-height: 160px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      background: var(--panel);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      line-height: 1.45;
    }

    .image-viewer {
      display: block;
      width: 100%;
      max-height: 70dvh;
      object-fit: contain;
      border-radius: 8px;
      background: var(--panel-3);
    }

    .gallery-tools {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
      gap: 10px;
    }

    .gallery-item {
      min-width: 0;
      display: grid;
      gap: 6px;
      padding: 7px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      text-align: left;
    }

    .gallery-item img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 8px;
      background: var(--panel-3);
    }

    .gallery-item strong,
    .gallery-item span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .gallery-item strong {
      font-size: 12px;
    }

    .gallery-item span {
      color: var(--muted);
      font-size: 11px;
    }

    .gallery-empty {
      min-height: 120px;
      display: grid;
      place-items: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 8px;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: translateY(8px) scale(.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 860px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .chat-main {
        border-right: 0;
      }

      .topbar {
        align-items: flex-start;
      }

      .toolbar {
        max-width: 180px;
      }

      .bubble-wrap {
        max-width: min(86%, 620px);
      }
    }

    @media (max-width: 560px) {
      .topbar,
      .searchbar,
      .composer {
        padding-left: 12px;
        padding-right: 12px;
      }

      .messages {
        padding-left: 12px;
        padding-right: 12px;
      }

      .composer-form {
        grid-template-columns: auto auto auto minmax(0, 1fr);
      }

      .send-btn {
        grid-column: 1 / -1;
        width: 100%;
      }

      .toolbar .ghost-btn {
        padding: 0 10px;
      }

      .searchbar {
        grid-template-columns: 1fr;
      }

      .message {
        --action-space: 44px;
      }

      .message > .avatar {
        margin-top: 21px;
      }

      .message-actions {
        max-width: min(300px, calc(100vw - 72px));
      }

      .menu-actions {
        gap: 5px;
      }

      .action-btn {
        height: 30px;
        padding: 0 9px;
        font-size: 12px;
      }

      .reaction-picker {
        position: fixed;
        left: 50%;
        right: auto;
        bottom: 96px;
        transform: translateX(-50%);
        width: min(292px, calc(100vw - 24px));
        grid-template-columns: repeat(5, minmax(42px, 1fr));
        z-index: 40;
      }

      .message.mine .reaction-picker {
        left: 50%;
        right: auto;
      }

      .reaction-picker button {
        width: 100%;
        height: 38px;
      }

      .modal-root {
        padding: 10px;
        align-items: end;
      }

      .modal-panel {
        width: 100%;
        max-height: min(92dvh, 760px);
      }

      .modal-head,
      .modal-body,
      .modal-actions {
        padding-left: 14px;
        padding-right: 14px;
      }

      .modal-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .modal-error {
        grid-column: 1 / -1;
      }

      .settings-grid {
        grid-template-columns: 1fr;
      }

      .settings-preview {
        grid-template-columns: auto minmax(0, 1fr);
        justify-items: start;
      }

      .settings-row,
      .password-fields {
        grid-template-columns: 1fr;
      }

      .profile-banner {
        min-height: 120px;
      }

      .profile-main .avatar {
        width: 66px;
        height: 66px;
      }

      .profile-stats {
        grid-template-columns: 1fr;
      }

      .gallery-tools {
        grid-template-columns: 1fr;
      }

      .link-preview {
        grid-template-columns: minmax(0, 1fr);
      }

      .link-preview img {
        width: 100%;
        height: auto;
        max-height: 170px;
      }
    }

    @media (hover: none), (pointer: coarse) {
      .hover-card {
        display: none;
      }

      .message.has-actions:hover {
        margin-bottom: 10px;
      }

      .message.has-actions:hover > .avatar,
      .message.has-actions:hover .bubble-wrap {
        transform: none;
      }

      .message:hover .message-actions {
        opacity: 0;
        pointer-events: none;
        transform: translateY(-4px);
      }

      .message.has-actions.actions-open,
      .message.has-actions:focus-within {
        margin-bottom: var(--action-space);
      }

      .message.has-actions.actions-open > .avatar,
      .message.has-actions.actions-open .bubble-wrap,
      .message.has-actions:focus-within > .avatar,
      .message.has-actions:focus-within .bubble-wrap {
        transform: translateY(-6px);
      }

      .message.actions-open .message-actions,
      .message:focus-within .message-actions {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body data-theme="dark">
  <main id="loginScreen" class="login-screen">
    <form id="loginForm" class="login-card" autocomplete="off">
      <div class="brand">
        <div class="brand-mark">VAQ</div>
        <div>
          <h1>Kênh Chat Notj Gallery</h1>
          <p>Realtime chat</p>
        </div>
      </div>

      <div class="auth-tabs" role="tablist" aria-label="Tài khoản">
        <button id="loginModeBtn" class="auth-tab active" type="button">Đăng nhập</button>
        <button id="registerModeBtn" class="auth-tab" type="button">Tạo tài khoản</button>
      </div>

      <div class="field">
        <label for="username">Tên đăng nhập</label>
        <input id="username" maxlength="32" minlength="3" placeholder="Nhập tên đăng nhập" required>
      </div>

      <div class="field">
        <label for="password">Mật khẩu</label>
        <input id="password" type="password" minlength="6" maxlength="128" placeholder="Nhập mật khẩu" required>
      </div>

      <div id="profileFields" class="field hidden">
        <label for="colorPick">Màu tên và avatar</label>
        <div class="input-row">
          <input id="colorPick" type="color" value="#22c55e" aria-label="Màu tên">
          <input id="avatarURL" inputmode="url" placeholder="Link avatar tùy chọn">
        </div>
      </div>

      <p id="authHint" class="auth-hint">Đăng nhập bằng tài khoản đã tạo.</p>
      <button id="authSubmitBtn" class="primary-btn" type="submit">Đăng nhập</button>
    </form>
  </main>

  <section id="appShell" class="app-shell hidden" aria-label="Chat">
    <section class="chat-main">
      <header class="topbar">
        <div class="room-title">
          <h2>Notj Gallery</h2>
          <div class="room-meta">
            <span id="statusDot" class="status-dot"></span>
            <span id="connectionStatus">Đang kết nối</span>
            <span id="onlineCount">36 online</span>
          </div>
        </div>
        <div class="toolbar">
          <button id="themeBtn" class="ghost-btn" type="button">Sáng</button>
          <button id="galleryBtn" class="ghost-btn" type="button">Gallery</button>
          <button id="settingsBtn" class="ghost-btn" type="button">Cài đặt</button>

    bindProfileHover(els.profileName, () => ({ userId: state.userId }));
