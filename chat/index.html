    function setAuthMode(mode) {
      state.authMode = mode;
      const isRegister = mode === 'register';
      els.loginModeBtn.classList.toggle('active', !isRegister);
      els.registerModeBtn.classList.toggle('active', isRegister);
      els.profileFields.classList.toggle('hidden', !isRegister);
      els.authSubmitBtn.textContent = isRegister ? 'Tạo tài khoản' : 'Đăng nhập';
      els.authHint.textContent = isRegister
        ? 'Username không được trùng với tài khoản đã có.'
        : 'Đăng nhập bằng tài khoản đã tạo.';
      els.password.value = '';
      els.password.focus();
    }

    function sanitizeName(value) {
      return String(value || '').trim().replace(/\s+/g, ' ').slice(0, 32);
    }

    function sanitizeAvatar(value) {
      const avatar = String(value || '').trim();
      if (!avatar) return DEFAULT_AVATAR;

      try {
        const url = new URL(avatar);
        return ['http:', 'https:'].includes(url.protocol) ? url.toString() : DEFAULT_AVATAR;
      } catch {
        return DEFAULT_AVATAR;
      }
    }

    function sanitizeBanner(value) {
      const banner = String(value || '').trim();
      if (!banner) return DEFAULT_BANNER;

      try {
        const url = new URL(banner);
        return ['http:', 'https:'].includes(url.protocol) ? url.toString() : DEFAULT_BANNER;
      } catch {
        return DEFAULT_BANNER;
      }
    }

    function sanitizeBio(value) {
      return String(value || '').trim().replace(/\s+/g, ' ').slice(0, 180);
    }

    function normalizeStatus(value) {
      const status = String(value || '').trim().toLowerCase();
      return STATUS_LABELS[status] ? status : 'active';
    }

    function getOwnStatusLabel() {
      return STATUS_LABELS[normalizeStatus(state.status)] || STATUS_LABELS.active;
    }

    function buildEmojiPanel() {
      const fragment = document.createDocumentFragment();
      for (const emoji of EMOJIS) {
        const button = document.createElement('button');
        button.type = 'button';
        button.textContent = emoji;
        button.addEventListener('click', () => insertAtCursor(emoji));
        fragment.appendChild(button);
      }
      els.emojiPanel.appendChild(fragment);
    }

    async function handleImageFileChange() {
      const file = els.imageFile.files?.[0];
      if (!file) return;

      if (!/^image\/(png|jpe?g|webp|gif)$/i.test(file.type)) {
        showToast('Chỉ hỗ trợ ảnh png, jpg, webp hoặc gif.');
        els.imageFile.value = '';
        return;
      }

      if (file.size > MAX_SOURCE_IMAGE_BYTES) {
        showToast('Ảnh nguồn tối đa 8MB.');
        els.imageFile.value = '';
        return;
      }

      try {
        setSendState('Đang nén ảnh...');
        const prepared = await prepareImageUpload(file);
        if (prepared.size > MAX_IMAGE_BYTES) {
          showToast('Ảnh sau nén vẫn quá 1.5MB.');
          return;
        }

        state.selectedImage = {
          url: prepared.url,
          name: getUploadImageName(file),
          type: prepared.type || file.type,
          size: prepared.size,
          compressed: prepared.compressed
        };
        renderImagePreview();
        if (prepared.compressed) {
          showToast(`Đã nén ảnh còn ${formatFileSize(prepared.size)}.`);
        }
      } catch {
        showToast('Không xử lý được ảnh này.');
      } finally {
        setSendState('Sẵn sàng');
        els.imageFile.value = '';
      }
    }

    async function prepareImageUpload(file) {
      if (/^image\/gif$/i.test(file.type)) {
        const url = await readFileAsDataUrl(file);
        return { url, type: file.type, size: file.size, compressed: false };
      }

      const compressed = await compressImageFile(file);
      const usableBlob = compressed && compressed.size < file.size ? compressed : file;
      if (usableBlob.size > MAX_IMAGE_BYTES) {
        throw new Error('image too large');
      }

      const url = await readFileAsDataUrl(usableBlob);
      return {
        url,
        type: usableBlob.type || file.type,
        size: usableBlob.size,
        compressed: usableBlob !== file
      };
    }

    async function compressImageFile(file) {
      const source = await loadImageElement(file);
      const outputType = /^image\/webp$/i.test(file.type)
        ? 'image/webp'
        : /^image\/png$/i.test(file.type)
          ? 'image/png'
          : 'image/jpeg';
      const dimensions = [1280, 1024, 800, 640];
      const qualities = outputType === 'image/png' ? [1] : [.86, .74, .62, .52];
      let bestBlob = null;

      for (const maxDimension of dimensions) {
        const scale = Math.min(1, maxDimension / Math.max(source.width, source.height));
        const width = Math.max(1, Math.round(source.width * scale));
        const height = Math.max(1, Math.round(source.height * scale));
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const context = canvas.getContext('2d', { alpha: outputType === 'image/png' });
        context.drawImage(source, 0, 0, width, height);

        for (const quality of qualities) {
          const blob = await canvasToBlob(canvas, outputType, quality);
          if (!blob) continue;
          if (!bestBlob || blob.size < bestBlob.size) bestBlob = blob;
          if (blob.size <= MAX_IMAGE_BYTES) return blob;
        }
      }

      return bestBlob;
    }

    function loadImageElement(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const image = new Image();
        image.onload = () => {
          URL.revokeObjectURL(url);
          resolve(image);
        };
        image.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error('image load failed'));
        };
        image.src = url;
      });
    }

    function canvasToBlob(canvas, type, quality) {
      return new Promise((resolve) => {
        canvas.toBlob(resolve, type, quality);
      });
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(new Error('read failed'));
        reader.readAsDataURL(file);
      });
    }

    function getUploadImageName(file) {
      const name = String(file?.name || '').split(/[?#]/)[0];
      const match = name.match(/\.([a-z0-9]{1,8})$/i);
      const extension = match ? match[1].toLowerCase() : '';
      const safeExtension = ['png', 'jpg', 'jpeg', 'webp', 'gif'].includes(extension)
        ? extension
        : getExtensionFromImageType(file?.type);
      return safeExtension ? `quannotj.${safeExtension}` : 'quannotj';
    }

    function getExtensionFromImageType(type = '') {
      const byType = {
        'image/png': 'png',
        'image/jpeg': 'jpg',
        'image/jpg': 'jpg',
        'image/webp': 'webp',
        'image/gif': 'gif'
      };
      return byType[String(type || '').toLowerCase()] || '';
    }

    function clearSelectedImage() {
      state.selectedImage = null;
      els.imageFile.value = '';
      renderImagePreview();
    }

    function renderImagePreview() {
      const image = state.selectedImage;
      els.imagePreview.classList.toggle('hidden', !image);
      if (!image) return;

      els.imagePreviewImg.src = image.url;
      els.imagePreviewName.textContent = image.name || 'image';
      els.imagePreviewSize.textContent = `${formatFileSize(image.size || 0)}${image.compressed ? ' · đã nén' : ''}`;
    }

    function formatFileSize(bytes) {
      const size = Number(bytes || 0);
      if (size >= 1024 * 1024) return `${(size / 1024 / 1024).toFixed(1)}MB`;
      if (size >= 1024) return `${Math.ceil(size / 1024)}KB`;
      return `${size}B`;
    }

    function normalizeMentionText(value) {
      return String(value || '').normalize('NFC').toLowerCase();
    }

    function isMentionForMe(message) {
      if (!message || Number(message.userId) === Number(state.userId)) return false;
      if (isBlockedUserId(message.userId)) return false;

      const text = normalizeMentionText(message.text);
      const username = normalizeMentionText(state.username);
      if (!text || !username) return false;

      const mention = `@${username}`;
      const compactMention = `@${username.replace(/\s+/g, '')}`;
      return text.includes(mention) || text.replace(/\s+/g, '').includes(compactMention);
    }

    function handleIncomingMention(message) {
      if (!isMentionForMe(message)) return;
      if (document.hidden) {
        state.mentionUnreadCount += 1;
        updateMentionBadge();
      } else {
        showToast(`${message.user || 'Ai đó'} vừa nhắc đến bạn.`);
      }
    }

    function updateMentionBadge() {
      document.title = state.mentionUnreadCount
        ? `(${state.mentionUnreadCount}) ${BASE_TITLE}`
        : BASE_TITLE;
    }

    function resetMentionBadge() {
      state.mentionUnreadCount = 0;
      updateMentionBadge();
    }

    function isBlockedUserId(userId) {
      return state.blockedUsers.has(Number(userId));
    }

    function saveBlockedUsers() {
      localStorage.setItem('chat:blockedUsers', JSON.stringify(Array.from(state.blockedUsers)));
    }

    function toggleBlockedUser(profile) {
      const userId = Number(profile?.id || profile?.userId);
      if (!Number.isSafeInteger(userId) || userId < 1 || Number(userId) === Number(state.userId)) return;

      if (state.blockedUsers.has(userId)) {
        state.blockedUsers.delete(userId);
        showToast(`Đã bỏ chặn ${profile.username || profile.name || 'người dùng'}.`);
      } else {
        state.blockedUsers.add(userId);
        showToast(`Đã chặn ${profile.username || profile.name || 'người dùng'}.`);
      }

      saveBlockedUsers();
      closeModal(null);
      renderMessages({ forceScroll: true });
      renderUsers(state.lastUsers || []);
    }

    async function startChat(event) {
      event.preventDefault();

      const username = sanitizeName(els.username.value);
      const password = els.password.value;
      if (username.length < 3) {
        showToast('Tên đăng nhập cần ít nhất 3 ký tự.');
        return;
      }
      if (password.length < 6) {
        showToast('Mật khẩu cần ít nhất 6 ký tự.');
        return;
      }

      els.authSubmitBtn.disabled = true;
      state.lastServerOffset = 0;
      state.messages.clear();
      state.order = [];
      state.pending.clear();
      state.hasMoreHistory = false;
      state.loadingHistory = false;
      state.oldestMessageId = null;
      state.openReactionPickerId = null;
      state.openActionMessageId = null;

      try {
        connectSocket();
        await waitForSocketConnect();

        const payload = {
          username,
          password,
          color: els.colorPick.value || '#22c55e',
          avatar: sanitizeAvatar(els.avatarURL.value)
        };
        const eventName = state.authMode === 'register' ? 'auth:register' : 'auth:login';
        const response = await emitWithAck(eventName, payload);

        if (!response.ok) {
          showToast(response.error || 'Không thể xác thực tài khoản.');
          return;
        }

        applyAuthenticatedUser(response.user);
      } catch {
        showToast('Không kết nối được máy chủ.');
      } finally {
        els.authSubmitBtn.disabled = false;
      }
    }

    function connectSocket() {
      if (state.socket) return;

      const socket = io({
        auth: { serverOffset: 0 },
        reconnectionAttempts: Infinity,
        reconnectionDelayMax: 4000
      });

      state.socket = socket;

      socket.on('connect', () => {
        updateConnection(true);
      });

      socket.on('disconnect', () => updateConnection(false));
      socket.on('connect_error', () => updateConnection(false));

      socket.on('server:config', (config) => {
        state.adminEnabled = Boolean(config.adminEnabled);
        state.maxMessageLength = Number(config.maxMessageLength || 1000);
        els.input.maxLength = state.maxMessageLength;
        els.adminBtn.classList.toggle('hidden', !state.adminEnabled || state.isAdmin);
        updateCharCount();
      });

      socket.on('history:page', (page) => {
        applyHistoryPage(page, page?.mode || 'initial');
      });

      socket.on('pin:list', (messages = []) => {
        state.pinnedMessages = messages;
        updatePinnedBar();
      });

      socket.on('chat message', (message, serverOffset) => {
        const wasNearBottom = isNearBottom();
        const isPendingAck = Boolean(message.clientOffset && state.pending.has(message.clientOffset));
        const isIncomingFromOther = Number(message.userId) !== Number(state.userId) && message.user !== state.username;
        const shouldMarkUnread = !isPendingAck
          && isIncomingFromOther
          && !isBlockedUserId(message.userId)
          && (!wasNearBottom || document.hidden);

        upsertMessage(message);
        state.lastServerOffset = Number(serverOffset || message.id || state.lastServerOffset);
        socket.auth.serverOffset = state.lastServerOffset;

        if (isPendingAck) {
          state.pending.delete(message.clientOffset);
          resetUnreadMessages();
          renderMessages({ forceScroll: true });
          return;
        } else {
          handleIncomingMention(message);
          if (shouldMarkUnread) markUnreadMessage(message);
        }

        renderMessages({ keepScroll: true });
      });

      socket.on('message:deleted', (message) => {
        upsertMessage(message);
        updatePinnedMessage(message);
        renderMessages({ keepScroll: true });
      });

      socket.on('message:edited', (message) => {
        upsertMessage(message);
        updatePinnedMessage(message);
        renderMessages({ keepScroll: true });
      });

      socket.on('message:reactions', ({ messageId, reactions }) => {
        const message = state.messages.get(Number(messageId));
        if (message) {
          message.reactions = reactions || [];
          renderMessages({ keepScroll: true });
        }
      });

      socket.on('message:pinned', (message) => {
        upsertMessage(message);
        updatePinnedMessage(message);
        renderMessages({ keepScroll: true });
      });

      socket.on('account:updated', (user) => {
        applyPublicAccountUpdate(user);
      });

      socket.on('moderation:muted', ({ mutedUntil, reason }) => {
        state.mutedUntil = mutedUntil;
        showToast(reason ? `${reason}. Bạn đang bị tạm khóa chat.` : 'Bạn đang bị tạm khóa chat.');
      });

      socket.on('moderation:unmuted', ({ reason } = {}) => {
        state.mutedUntil = null;
        showToast(reason ? `${reason}. Bạn đã chat lại được.` : 'Bạn đã được mở khóa chat.');
      });

      socket.on('moderation:kicked', ({ reason }) => {
        showToast(reason || 'Bạn đã bị kick khỏi phòng chat.');
        setTimeout(() => window.location.reload(), 1200);
      });

      socket.on('chat:cleared', ({ clearedBy }) => {
        state.messages.clear();
        state.order = [];
        state.pending.clear();
        state.pinnedMessages = [];
        state.hasMoreHistory = false;
        state.oldestMessageId = null;
        state.openReactionPickerId = null;
        state.openActionMessageId = null;
        resetUnreadMessages();
        cancelReply();
        updatePinnedBar();
        renderMessages();
        showToast(`${clearedBy || 'Admin'} đã xóa hẳn toàn bộ chat.`);
      });

      socket.on('presence:update', renderUsers);
      socket.on('typing', renderTyping);
    }

    function waitForSocketConnect() {
      if (state.socket?.connected) return Promise.resolve();

      return new Promise((resolve, reject) => {
        const timer = setTimeout(() => {
          cleanup();
          reject(new Error('connect timeout'));
        }, 6000);

        function cleanup() {
          clearTimeout(timer);
          state.socket.off('connect', handleConnect);
          state.socket.off('connect_error', handleError);
        }

        function handleConnect() {
          cleanup();
          resolve();
        }

        function handleError(error) {
          cleanup();
          reject(error);
        }

        state.socket.once('connect', handleConnect);
        state.socket.once('connect_error', handleError);
      });
    }

    function applyAuthenticatedUser(user) {
      state.authenticated = true;
      state.appReady = true;
      state.userId = user.id;
      state.username = user.username;
      state.color = user.color || '#22c55e';
      state.avatar = sanitizeAvatar(user.avatar);
      state.banner = sanitizeBanner(user.banner);
      state.bio = sanitizeBio(user.bio);
      state.status = normalizeStatus(user.status);
      state.lastActiveAt = user.lastActiveAt || null;
      state.mutedUntil = user.mutedUntil || null;
      state.profileCache.set(Number(user.id), { ...user, isOnline: true });

      localStorage.setItem('chat:profile', JSON.stringify({
        name: state.username,
        color: state.color,
        avatar: state.avatar
      }));

      els.loginScreen.classList.add('hidden');
      els.appShell.classList.remove('hidden');
      els.profileAvatar.src = state.avatar;
      els.profileName.textContent = state.username;
      els.profileSub.textContent = getOwnStatusLabel();
      renderMessages();
      restoreDraft();
      els.input.focus();
    }

    function applyPublicAccountUpdate(user) {
      if (!user?.id) return;

      if (Number(user.id) === Number(state.userId)) {
        state.username = user.username || state.username;
        state.color = user.color || state.color;
        state.avatar = sanitizeAvatar(user.avatar || state.avatar);
        state.banner = sanitizeBanner(user.banner);
        state.bio = sanitizeBio(user.bio);
        state.status = normalizeStatus(user.status);
        state.lastActiveAt = user.lastActiveAt || state.lastActiveAt;
        if (Object.prototype.hasOwnProperty.call(user, 'mutedUntil')) {
          state.mutedUntil = user.mutedUntil || null;
        }
        els.profileAvatar.src = state.avatar;
        els.profileName.textContent = state.username;
        els.profileSub.textContent = state.isAdmin ? `Admin · ${getOwnStatusLabel()}` : getOwnStatusLabel();
        localStorage.setItem('chat:profile', JSON.stringify({
          name: state.username,
          color: state.color,
          avatar: state.avatar
        }));
      }

      for (const message of state.messages.values()) {
        if (Number(message.userId) === Number(user.id)) {
          message.user = user.username || message.user;
          message.color = user.color || message.color;
          message.avatar = user.avatar || message.avatar;
        }
      }

      state.profileCache.set(Number(user.id), {
        ...(state.profileCache.get(Number(user.id)) || {}),
        ...user
      });

      renderMessages({ keepScroll: true });
    }

    function applyHistoryPage(page = {}, mode = 'initial', preserve = null) {
      const messages = Array.isArray(page.messages) ? page.messages : [];

      if (mode === 'initial') {
        state.messages.clear();
        state.order = [];
        state.pending.clear();
        resetUnreadMessages();
        for (const message of messages) {
          upsertMessage(message);
        }
        state.hasMoreHistory = Boolean(page.hasMore);
        state.oldestMessageId = page.oldestId || getOldestMessageId();
        renderMessages();
        scrollToBottom(false);
        return;
      }

      for (let index = messages.length - 1; index >= 0; index -= 1) {
        upsertMessage(messages[index], { prepend: true });
      }
      state.hasMoreHistory = Boolean(page.hasMore);
      state.oldestMessageId = page.oldestId || getOldestMessageId();

      if (preserve) {
        renderMessages({
          preserveScroll: true,
          previousScrollHeight: preserve.scrollHeight,
          previousScrollTop: preserve.scrollTop
        });
      } else {
        renderMessages({ keepScroll: true });
      }
    }

    function getOldestMessageId() {
      let oldest = null;
      for (const id of state.order) {
        if (typeof id === 'number') {
          oldest = oldest === null ? id : Math.min(oldest, id);
        }
      }
      return oldest;
    }

    function handleMessageScroll() {
      if (els.messages.scrollTop < 80) {
        loadOlderHistory();
      }
      if (isNearBottom()) {
        resetUnreadMessages();
      }
    }

    async function loadOlderHistory() {
      if (
        state.loadingHistory ||
        !state.hasMoreHistory ||
        !state.authenticated ||
        !state.socket?.connected ||
        state.searchTerm
      ) {
        return;
      }

      const oldestId = state.oldestMessageId || getOldestMessageId();
      if (!oldestId) return;

      state.loadingHistory = true;
      let preserve = {
        scrollHeight: els.messages.scrollHeight,
        scrollTop: els.messages.scrollTop
      };
      renderMessages({
        preserveScroll: true,
        previousScrollHeight: preserve.scrollHeight,
        previousScrollTop: preserve.scrollTop
      });

      preserve = {
        scrollHeight: els.messages.scrollHeight,
        scrollTop: els.messages.scrollTop
      };
      const response = await emitWithAck('history:before', oldestId);
      state.loadingHistory = false;

      if (!response.ok) {
        renderMessages({
          preserveScroll: true,
          previousScrollHeight: preserve.scrollHeight,
          previousScrollTop: preserve.scrollTop
        });
        showToast(response.error || 'Không tải được tin nhắn cũ.');
        return;
      }

      applyHistoryPage(response, 'older', preserve);
    }

    function updatePinnedMessage(message) {
      state.pinnedMessages = state.pinnedMessages.filter((item) => Number(item.id) !== Number(message.id));
      if (message.pinnedAt && !message.deletedAt) {
        state.pinnedMessages.unshift(message);
      }
      state.pinnedMessages.sort((a, b) => String(b.pinnedAt || '').localeCompare(String(a.pinnedAt || '')));
      state.pinnedMessages = state.pinnedMessages.slice(0, 5);
      updatePinnedBar();
    }

    function updatePinnedBar() {
      const pinned = state.pinnedMessages.find((message) => message.pinnedAt && !message.deletedAt);
      if (!pinned) {
        els.pinBar.classList.add('hidden');
        els.pinText.textContent = '';
        return;
      }

      els.pinText.textContent = `Đã ghim: ${pinned.user}: ${(pinned.text || (pinned.imageUrl ? '[Ảnh]' : '')).slice(0, 140)}`;
      els.pinBar.dataset.messageId = pinned.id;
      els.pinBar.classList.remove('hidden');
    }

    function jumpToPinnedMessage() {
      const id = Number(els.pinBar.dataset.messageId || 0);
      if (!id) return;
      jumpToMessage(id);
    }

    async function jumpToMessage(messageId) {
      const id = Number.parseInt(messageId, 10);
      if (!Number.isSafeInteger(id) || id < 1) return;

      if (state.searchTerm) {
        state.searchTerm = '';
        els.searchInput.value = '';
        renderMessages();
      }

      let node = getMessageNode(id);
      if (!node && state.hasMoreHistory && !state.loadingHistory) {
        showToast('Đang tải tin nhắn gốc...');
        for (let index = 0; index < 12 && state.hasMoreHistory && !node; index += 1) {
          await loadOlderMessages();
          node = getMessageNode(id);
        }
      }

      if (!node) {
        showToast('Không tìm thấy tin nhắn gốc trong lịch sử đã tải.');
        return;
      }

      focusMessageNode(node);
    }

    function getMessageNode(id) {
      return els.messages.querySelector(`[data-id="${String(id)}"]`);
    }

    function focusMessageNode(node) {
      node.scrollIntoView({ behavior: 'smooth', block: 'center' });
      node.classList.add('jump-highlight');
      clearTimeout(focusMessageNode.timer);
      focusMessageNode.timer = setTimeout(() => {
        node.classList.remove('jump-highlight');
      }, 1800);
    }

    function emitWithAck(eventName, ...args) {
      return new Promise((resolve) => {
        state.socket.timeout(12000).emit(eventName, ...args, (error, response) => {
          if (error) {
            resolve({ ok: false, error: 'Máy chủ phản hồi chậm. Thử lại sau.' });
            return;
          }
          resolve(response || { ok: true });
        });
      });
    }

    function handleMessageTap(event) {
      const usesHoverActions = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
      if (usesHoverActions) return;

      const target = event.target instanceof Element ? event.target : event.target.parentElement;
      if (!target) return;
      if (target.closest('button, a, input, textarea, .reaction-picker')) return;

      const item = target.closest('.message[data-id]');
      const nextId = item && els.messages.contains(item) ? String(item.dataset.id) : null;
      const isSameMessage = nextId && String(state.openActionMessageId) === nextId;

      state.openActionMessageId = isSameMessage ? null : nextId;
      state.openReactionPickerId = null;
      renderMessages({ keepScroll: true });
    }

    function openModal(options = {}) {
      if (state.activeModal) {
        closeModal(null);
      }

      return new Promise((resolve) => {
        state.activeModal = {
          resolve,
          read: typeof options.read === 'function' ? options.read : () => ({ ok: true, value: true })
        };

        els.modalPanel.className = `modal-panel${options.large ? ' large' : ''}`;
        els.modalKicker.textContent = options.kicker || 'Chat';
        els.modalTitle.textContent = options.title || '';
        els.modalSubtitle.textContent = options.subtitle || '';
        els.modalCancelBtn.textContent = options.cancelText || 'Hủy';
        els.modalConfirmBtn.textContent = options.confirmText || 'OK';
        els.modalConfirmBtn.className = `primary-btn modal-confirm${options.danger ? ' danger' : ''}`;
        els.modalCancelBtn.classList.toggle('hidden', Boolean(options.hideCancel));
        els.modalBody.textContent = '';
        setModalError('');

        if (typeof options.build === 'function') {
          options.build(els.modalBody);
        }

        els.modalRoot.classList.remove('hidden');
        els.modalRoot.setAttribute('aria-hidden', 'false');

        const focusTarget = options.focusSelector
          ? els.modalBody.querySelector(options.focusSelector)
          : els.modalBody.querySelector('input, textarea, button');
        setTimeout(() => (focusTarget || els.modalConfirmBtn).focus(), 0);
      });
    }

    function closeModal(value) {
      if (!state.activeModal) return;
      const { resolve } = state.activeModal;
      state.activeModal = null;
      els.modalRoot.classList.add('hidden');
      els.modalRoot.setAttribute('aria-hidden', 'true');
      els.modalBody.textContent = '';
      setModalError('');
      resolve(value);
    }

    function handleModalConfirm() {
      if (!state.activeModal) return;
      const result = state.activeModal.read();
      if (!result || result.ok === false) {
        setModalError(result?.error || 'Kiểm tra lại thông tin.');
        return;
      }
      closeModal(Object.prototype.hasOwnProperty.call(result, 'value') ? result.value : true);
    }

    function handleModalKeydown(event) {
      if (event.key === 'Escape') {
        event.preventDefault();
        closeModal(null);
        return;
      }
      if (event.key === 'Enter' && !event.shiftKey && event.target.tagName !== 'TEXTAREA') {
        event.preventDefault();
        handleModalConfirm();
      }
    }

    function setModalError(text) {
      els.modalError.textContent = text || '';
      els.modalError.classList.toggle('hidden', !text);
    }

    function modalField(labelText, control) {
      const field = document.createElement('label');
      field.className = 'modal-field';
      const label = document.createElement('span');
      label.textContent = labelText;
      field.append(label, control);
      return field;
    }

    function modalInput(options = {}) {
      const input = document.createElement('input');
      input.type = options.type || 'text';
      input.value = options.value || '';
      input.placeholder = options.placeholder || '';
      input.autocomplete = options.autocomplete || 'off';
      if (options.maxLength) input.maxLength = options.maxLength;
      if (options.inputMode) input.inputMode = options.inputMode;
      if (options.min !== undefined) input.min = options.min;
      if (options.max !== undefined) input.max = options.max;
      if (options.step !== undefined) input.step = options.step;
      return input;
    }

    function modalSelect(options = [], value = '') {
      const select = document.createElement('select');
      for (const option of options) {
        const item = document.createElement('option');
        item.value = option.value;
        item.textContent = option.label;
        select.appendChild(item);
      }
      select.value = value;
      return select;
    }

    function modalTextarea(options = {}) {
      const textarea = document.createElement('textarea');
      textarea.value = options.value || '';
      textarea.placeholder = options.placeholder || '';
      if (options.maxLength) textarea.maxLength = options.maxLength;
      return textarea;
    }

    function modalNote(text) {
      const note = document.createElement('p');
      note.className = 'modal-note';
      note.textContent = text;
      return note;
    }

    function confirmModal(options = {}) {
      return openModal({
        kicker: options.kicker || 'Xác nhận',
        title: options.title || 'Xác nhận thao tác',
        subtitle: options.subtitle || '',
        confirmText: options.confirmText || 'Xác nhận',
        cancelText: options.cancelText || 'Hủy',
        danger: Boolean(options.danger),
        build(body) {
          if (options.note) body.appendChild(modalNote(options.note));
        },
        read: () => ({ ok: true, value: true })
      });
    }

    async function sendMessage(event) {
      event.preventDefault();
      if (!state.socket || !state.socket.connected) {
        showToast('Chưa kết nối máy chủ.');
        return;
      }
      if (!state.authenticated) {
        showToast('Hãy đăng nhập trước khi chat.');
        return;
      }
      if (state.mutedUntil && Date.parse(state.mutedUntil) > Date.now()) {
        showToast('Bạn đang bị tạm khóa chat.');
        return;
      }

      const text = els.input.value.trim();
      const image = state.selectedImage;
      if (!text && !image) return;
      if (text.length > state.maxMessageLength) {
        showToast('Tin nhắn quá dài.');
        return;
      }

      const clientOffset = `${state.socket.id}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      const payload = {
        user: state.username,
        text,
        image: image ? {
          url: image.url,
          name: image.name,
          type: image.type
        } : null,
        color: state.color,
        avatar: state.avatar,
        replyToId: state.replyToId
      };

      state.pending.set(clientOffset, true);
      upsertMessage({
        id: `pending-${clientOffset}`,
        clientOffset,
        ...payload,
        imageUrl: image?.url || null,
        imageName: image?.name || null,
        imageType: image?.type || null,
        createdAt: new Date().toISOString(),
        pending: true
      });
      renderMessages({ forceScroll: true });

      els.input.value = '';
      autoGrowInput();
      updateCharCount();
      clearDraft();
      clearSelectedImage();
      cancelReply();
      setSendState('Đang gửi...');

      const response = await emitWithAck('chat message', payload, clientOffset);
      if (!response.ok) {
        state.pending.delete(clientOffset);
        state.messages.delete(`pending-${clientOffset}`);
        state.order = state.order.filter((id) => id !== `pending-${clientOffset}`);
        renderMessages({ forceScroll: true });
        showToast(response.error || 'Không gửi được tin nhắn.');
      }

      setSendState('Sẵn sàng');
    }

    function upsertMessage(message, options = {}) {
      if (!message || message.id === undefined || message.id === null) return;

      const existingPendingId = message.clientOffset ? `pending-${message.clientOffset}` : null;
      if (existingPendingId && state.messages.has(existingPendingId) && message.id !== existingPendingId) {
        state.messages.delete(existingPendingId);
        state.order = state.order.filter((id) => id !== existingPendingId);
      }

      const id = message.id;
      if (!state.messages.has(id)) {
        if (options.prepend) {
          state.order.unshift(id);
        } else {
          state.order.push(id);
        }
      }
      state.messages.set(id, message);
    }

    function renderMessages(options = {}) {
      const shouldStick = options.forceScroll ? true : options.keepScroll ? isNearBottom() : true;
      els.messages.textContent = '';
      const fragment = document.createDocumentFragment();

      if (!state.searchTerm && state.authenticated) {
        fragment.appendChild(createHistoryStatusNode());
      }

      for (const id of state.order) {
        const message = state.messages.get(id);
        if (!message || !matchesSearch(message)) continue;
        if (!state.searchTerm && state.unreadStartId && String(id) === String(state.unreadStartId)) {
          fragment.appendChild(createUnreadSeparatorNode());
        }
        if (isBlockedUserId(message.userId) && Number(message.userId) !== Number(state.userId)) {
          fragment.appendChild(createBlockedMessageNode(message));
          continue;
        }
        fragment.appendChild(createMessageNode(message));
      }

      els.messages.appendChild(fragment);

      if (options.preserveScroll) {
        const heightDelta = els.messages.scrollHeight - options.previousScrollHeight;
        els.messages.scrollTop = options.previousScrollTop + heightDelta;
      } else if (options.forceScroll) {
        scrollToBottom(true);
      } else if (shouldStick) {
        scrollToBottom(false);
      }
    }

    function createHistoryStatusNode() {
      const item = document.createElement('li');
      item.className = 'history-status';

      if (state.loadingHistory) {
        item.textContent = 'Đang tải tin nhắn cũ...';
      } else if (state.hasMoreHistory) {
        item.textContent = 'Cuộn lên để xem tin nhắn cũ hơn';
      } else if (state.order.length) {
        item.textContent = 'Hết Tin Nhắn Rồi';
      } else {
        item.textContent = 'Chưa có tin nhắn';
      }

      return item;
    }

    function createUnreadSeparatorNode() {
      const item = document.createElement('li');
      item.className = 'unread-separator';
      item.textContent = 'Tin mới';
      return item;
    }

    function createMessageNode(message) {
      const isMine = message.user === state.username;
      const messageId = String(message.id);
      const item = document.createElement('li');
      item.className = `message${isMine ? ' mine' : ''}${message.deletedAt ? ' deleted' : ''}`;
      item.classList.toggle('mentioned', isMentionForMe(message));
      item.dataset.id = message.id;

      const avatar = document.createElement('img');
      avatar.className = 'avatar profile-trigger';
      avatar.alt = '';
      avatar.src = sanitizeAvatar(message.avatar);
      avatar.onerror = () => {
        avatar.src = DEFAULT_AVATAR;
      };
      avatar.title = `Xem profile ${message.user || ''}`;
      avatar.addEventListener('click', (event) => {
        event.stopPropagation();
        openUserProfile(message);
      });
      bindProfileHover(avatar, message);

      const wrap = document.createElement('div');
      wrap.className = 'bubble-wrap';

      const meta = document.createElement('div');
      meta.className = 'message-meta';

      const name = document.createElement('span');
      name.className = 'name profile-trigger';
      name.style.color = message.color || '#22c55e';
      name.textContent = message.user || 'Khách';
      name.title = `Xem profile ${message.user || ''}`;
      name.addEventListener('click', (event) => {
        event.stopPropagation();
        openUserProfile(message);
      });
      bindProfileHover(name, message);

      const time = document.createElement('span');
      time.textContent = formatTime(message.createdAt);

      const status = document.createElement('span');
      status.textContent = message.pending ? 'Đang gửi' : '';

      meta.append(name, time);
      if (message.pending) meta.appendChild(status);

      const actionArea = document.createElement('div');
      actionArea.className = 'message-actions';
      const reactionActions = document.createElement('div');
      reactionActions.className = 'actions reaction-actions';
      const menuActions = document.createElement('div');
      menuActions.className = 'actions menu-actions';

      if (!message.deletedAt && !message.pending) {
        const reactionToggle = actionButton('Emoji', () => toggleReactionPicker(message));
        reactionToggle.classList.add('reaction-toggle');
        reactionToggle.title = 'Mở bảng emoji reaction';
        reactionActions.appendChild(reactionToggle);

        if (String(state.openReactionPickerId) === String(message.id)) {
          reactionActions.appendChild(createReactionPicker(message));
        }

        menuActions.appendChild(actionButton('Trả lời', () => setReply(message)));
        menuActions.appendChild(actionButton('Copy', () => copyMessage(message)));
        if (isOwnMessage(message)) {
          menuActions.appendChild(actionButton('Sửa', () => editMessage(message)));
          menuActions.appendChild(actionButton('Thu hồi', () => revokeMessage(message)));
        }
        if (state.isAdmin) {
          menuActions.appendChild(actionButton(message.pinnedAt ? 'Bỏ ghim' : 'Ghim', () => pinMessage(message)));
          menuActions.appendChild(actionButton('Xóa', () => deleteMessage(message)));
        }
      }

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      if (message.replyToId) {
        const reply = document.createElement('button');
        reply.type = 'button';
        reply.className = 'reply-preview';
        reply.textContent = getReplyLabel(message.replyToId);
        reply.title = 'Nhảy tới tin nhắn gốc';
        reply.addEventListener('click', (event) => {
          event.stopPropagation();
          jumpToMessage(message.replyToId);
        });
        bubble.appendChild(reply);
      }

      const text = document.createElement('div');
      text.className = 'message-text';
      const messageText = getDeletedMessageText(message) || message.text || '';
      if (messageText) {
        appendHighlightedText(text, messageText);
        bubble.appendChild(text);
      }

      if (message.imageUrl && !message.deletedAt) {
        const image = document.createElement('img');
        image.className = 'message-image';
        image.alt = message.imageName || 'Ảnh trong chat';
        image.src = message.imageUrl;
        image.loading = 'lazy';
        image.addEventListener('click', (event) => {
          event.stopPropagation();
          openImageViewer(message);
        });
        bubble.appendChild(image);
      }

      if (message.linkPreview && !message.deletedAt) {
        bubble.appendChild(createLinkPreviewNode(message.linkPreview));
      }

      if (message.editedAt && !message.deletedAt) {
        const edited = document.createElement('button');
        edited.type = 'button';
        edited.className = 'edited-badge';
        edited.textContent = 'đã chỉnh sửa';
        edited.title = 'Xem lịch sử chỉnh sửa';
        edited.addEventListener('click', (event) => {
          event.stopPropagation();
          openEditHistory(message);
        });
        bubble.appendChild(edited);
      }

      if (Array.isArray(message.reactions) && message.reactions.length) {
        const reactions = document.createElement('div');
        reactions.className = 'reaction-row';
        for (const reaction of message.reactions) {
          const chip = document.createElement('button');
          chip.type = 'button';
          chip.className = 'reaction-chip';
          chip.textContent = `${reaction.emoji} ${reaction.count}`;
          chip.addEventListener('click', (event) => {
            event.stopPropagation();
            reactToMessage(message, reaction.emoji);
          });
          reactions.appendChild(chip);
        }
        bubble.appendChild(reactions);
      }

      if (message.deletedAt && message.deletedBy) {
        const deletedBy = document.createElement('div');
        deletedBy.className = 'message-meta';
        deletedBy.textContent = message.deletedReason === 'revoke'
          ? `Bởi ${message.user}`
          : `Bởi ${message.deletedBy}`;
        bubble.appendChild(deletedBy);
      }

      if (menuActions.childNodes.length) {
        actionArea.appendChild(menuActions);
      }
      if (reactionActions.childNodes.length) {
        actionArea.appendChild(reactionActions);
      }

      wrap.append(meta, bubble);
      if (actionArea.childNodes.length) {
        item.classList.add('has-actions');
        if (String(state.openActionMessageId) === messageId || String(state.openReactionPickerId) === messageId) {
          item.classList.add('actions-open');
        }
        wrap.appendChild(actionArea);
      }
      item.append(avatar, wrap);
      return item;
    }

    function createBlockedMessageNode(message) {
      const item = document.createElement('li');
      item.className = 'blocked-message';
      item.dataset.id = message.id;
      const notice = document.createElement('div');
      notice.className = 'blocked-notice';
      const text = document.createElement('span');
      text.textContent = `Tin nhắn từ ${message.user || 'người dùng'} đã bị chặn.`;
      notice.append(text, actionButton('Bỏ chặn', () => toggleBlockedUser({
        id: message.userId,
        username: message.user
      })));
      item.appendChild(notice);
      return item;
    }

    function actionButton(label, handler) {
      const button = document.createElement('button');
      button.className = 'action-btn';
      button.type = 'button';
      button.textContent = label;
      button.addEventListener('click', (event) => {
        event.stopPropagation();
        handler(event);
      });
      return button;
    }

    function appendHighlightedText(target, value) {
      const text = String(value || '');
      const pattern = /(@[\p{L}\p{N}_.-]{2,32})/gu;
      let lastIndex = 0;
      let match;

      while ((match = pattern.exec(text))) {
        if (match.index > lastIndex) {
          target.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
        }

        const mention = document.createElement('span');
        mention.className = `mention${isOwnMentionToken(match[0]) ? ' self' : ''}`;
        mention.textContent = match[0];
        target.appendChild(mention);
        lastIndex = pattern.lastIndex;
      }

      if (lastIndex < text.length) {
        target.appendChild(document.createTextNode(text.slice(lastIndex)));
      }
    }

    function createLinkPreviewNode(preview = {}) {
      const url = String(preview.url || '').trim();
      if (!url) return document.createDocumentFragment();

      const link = document.createElement('a');
      link.className = 'link-preview';
      link.href = url;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      link.addEventListener('click', (event) => event.stopPropagation());

      const main = document.createElement('div');
      main.className = 'link-preview-main';

      const host = document.createElement('div');
      host.className = 'link-preview-host';
      try {
        host.textContent = new URL(url).hostname.replace(/^www\./i, '');
      } catch {
        host.textContent = 'link';
      }

      const title = document.createElement('div');
      title.className = 'link-preview-title';
      title.textContent = preview.title || url;

      main.append(host, title);
      if (preview.description) {
        const desc = document.createElement('div');
        desc.className = 'link-preview-desc';
        desc.textContent = preview.description;
        main.appendChild(desc);
      }

      link.appendChild(main);

      if (preview.image) {
        const image = document.createElement('img');
        image.alt = '';
        image.loading = 'lazy';
        image.src = preview.image;
        link.appendChild(image);
      }

      return link;
    }

    function isOwnMentionToken(token) {
      const compactUsername = normalizeMentionText(state.username).replace(/\s+/g, '');
      const compactToken = normalizeMentionText(token).replace(/^@/, '').replace(/\s+/g, '');
      return Boolean(compactUsername && compactToken === compactUsername);
    }

    function toggleReactionPicker(message) {
      const messageId = String(message.id);
      state.openActionMessageId = messageId;
      state.openReactionPickerId = String(state.openReactionPickerId) === messageId
        ? null
        : message.id;
      renderMessages({ keepScroll: true });
    }

    function createReactionPicker(message) {
      const picker = document.createElement('div');
      picker.className = 'reaction-picker';

      for (const emoji of QUICK_REACTIONS) {
        const button = document.createElement('button');
        button.type = 'button';
        button.textContent = emoji;
        button.title = `React ${emoji}`;
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          reactToMessage(message, emoji);
        });
        picker.appendChild(button);
      }

      return picker;
    }

    function isOwnMessage(message) {
      return Number(message.userId) === Number(state.userId) || message.user === state.username;
    }

    function getDeletedMessageText(message) {
      if (!message.deletedAt) return '';
      return message.deletedReason === 'revoke'
        ? 'Tin nhắn đã được thu hồi'
        : 'Tin nhắn đã bị xóa';
    }

    function matchesSearch(message) {
      if (!state.searchTerm) return true;
      const haystack = `${message.user || ''} ${message.text || ''} ${message.imageName || ''}`.toLowerCase();
      return haystack.includes(state.searchTerm);
    }

    function getReplyLabel(id) {
      const message = state.messages.get(Number(id)) || state.messages.get(id);
      if (!message) return `Trả lời #${id}`;
      const text = getDeletedMessageText(message) || message.text || (message.imageUrl ? '[Ảnh]' : '');
      return `${message.user}: ${text}`.slice(0, 120);
    }

    function setReply(message) {
      state.replyToId = Number(message.id);
      els.replyText.textContent = `Trả lời ${message.user}: ${(message.text || (message.imageUrl ? '[Ảnh]' : '')).slice(0, 120)}`;
      els.replyBar.classList.remove('hidden');
      els.input.focus();
    }

    function cancelReply() {
      state.replyToId = null;
      els.replyBar.classList.add('hidden');
      els.replyText.textContent = '';
    }

    async function copyMessage(message) {
      try {
        await navigator.clipboard.writeText(message.text || message.imageName || '');
        showToast('Đã copy tin nhắn.');
      } catch {
        showToast('Không copy được trên trình duyệt này.');
      }
    }

    function bindProfileHover(element, source) {
      if (!element) return;
      element.addEventListener('mouseenter', () => scheduleHoverCard(element, source));
      element.addEventListener('mouseleave', hideHoverCardSoon);
    }

    function supportsHoverCards() {
      return window.matchMedia('(hover: hover) and (pointer: fine)').matches;
    }

    function resolveProfileSource(source) {
      return typeof source === 'function' ? source() : source;
    }

    function getProfileSourceId(source) {
      const userId = Number(source?.userId || source?.id);
      return Number.isSafeInteger(userId) && userId > 0 ? userId : null;
    }

    function scheduleHoverCard(anchor, source) {
      if (!supportsHoverCards()) return;
      clearTimeout(state.hoverCardTimer);
      clearTimeout(state.hideHoverCardTimer);
      const token = Symbol('hover-card');
      state.hoverCardToken = token;

      state.hoverCardTimer = setTimeout(async () => {
        const resolved = resolveProfileSource(source);
        const userId = getProfileSourceId(resolved);
        if (!userId) return;

        const profile = await getProfileForHover(userId, resolved);
        if (state.hoverCardToken !== token) return;
        if (!profile) return;
        renderHoverCard(profile, anchor);
      }, 180);
    }

    function hideHoverCardSoon() {
      clearTimeout(state.hoverCardTimer);
      clearTimeout(state.hideHoverCardTimer);
      state.hoverCardToken = null;
      state.hideHoverCardTimer = setTimeout(() => {
        els.hoverCard.classList.add('hidden');
      }, 160);
    }

    async function getProfileForHover(userId, source = {}) {
      let profile = state.profileCache.get(userId);
      if (profile) return profile;

      if (state.socket?.connected && state.authenticated) {
        const response = await emitWithAck('user:profile', { userId });
        if (response.ok && response.user) {
          profile = response.user;
          state.profileCache.set(userId, profile);
        }
      }

      return profile || {
        id: userId,
        username: source.username || source.name || source.user || 'Người dùng',
        color: source.color || '#22c55e',
        avatar: source.avatar || DEFAULT_AVATAR,
        banner: source.banner || '',
        bio: source.bio || '',
        isOnline: Boolean(source.isOnline)
      };
    }

    function renderHoverCard(profile, anchor) {
      if (!supportsHoverCards()) return;

      els.hoverCard.textContent = '';
      const banner = document.createElement('div');
      banner.className = 'profile-banner';
      const bannerUrl = sanitizeBanner(profile.banner);
      if (bannerUrl) {
        banner.style.backgroundImage = `url("${bannerUrl}")`;
      }

      const body = document.createElement('div');
      body.className = 'hover-card-body';

      const main = document.createElement('div');
      main.className = 'hover-card-main';

      const avatar = document.createElement('img');
      avatar.className = 'avatar';
      avatar.alt = '';
      avatar.src = sanitizeAvatar(profile.avatar);
      avatar.onerror = () => {
        avatar.src = DEFAULT_AVATAR;
      };

      const info = document.createElement('div');
      const name = document.createElement('h4');
      name.textContent = profile.username || 'Người dùng';
      name.style.color = profile.color || '#22c55e';
      const status = document.createElement('p');
      status.textContent = getPresenceText(profile);
      info.append(name, status);
      main.append(avatar, info);

      const bio = document.createElement('p');
      bio.textContent = profile.bio ? profile.bio.slice(0, 140) : 'Chưa có bio.';

      const actions = document.createElement('div');
      actions.className = 'hover-card-actions';
      actions.appendChild(actionButton('Profile', () => {
        els.hoverCard.classList.add('hidden');
        openUserProfile({ userId: profile.id });
      }));
      if (Number(profile.id) !== Number(state.userId)) {
        actions.appendChild(actionButton(isBlockedUserId(profile.id) ? 'Bỏ chặn' : 'Chặn', () => {
          els.hoverCard.classList.add('hidden');
          toggleBlockedUser(profile);
        }));
      }

      body.append(main, bio, actions);
      els.hoverCard.append(banner, body);
      els.hoverCard.classList.remove('hidden');

      const rect = anchor.getBoundingClientRect();
      const cardWidth = els.hoverCard.offsetWidth;
      const cardHeight = els.hoverCard.offsetHeight;
      const gap = 8;
      let left = Math.min(Math.max(12, rect.left), window.innerWidth - cardWidth - 12);
      let top = rect.bottom + gap;
      if (top + cardHeight > window.innerHeight - 12) {
        top = Math.max(12, rect.top - cardHeight - gap);
      }

      els.hoverCard.style.left = `${left}px`;
      els.hoverCard.style.top = `${top}px`;
    }

    async function openUserProfile(source) {
      const userId = Number(source?.userId || source?.id);
      if (!Number.isSafeInteger(userId) || userId < 1) {
        showToast('Không tìm thấy profile.');
        return;
      }

      let profile = state.profileCache.get(userId);
      const response = await emitWithAck('user:profile', { userId });
      if (response.ok && response.user) {
        profile = response.user;
        state.profileCache.set(userId, profile);
      } else if (!profile) {
        showToast(response.error || 'Không tải được profile.');
        return;
      }

      showUserProfileModal(profile);
    }

    function showUserProfileModal(profile) {
      const profileStatus = normalizeStatus(profile.status);
      openModal({
        kicker: 'Profile',
        title: profile.username || 'Người dùng',
        subtitle: getPresenceText(profile),
        confirmText: 'Đóng',
        hideCancel: true,
        large: true,
        build(body) {
          const card = document.createElement('div');
          card.className = 'profile-card';

          const banner = document.createElement('div');
          banner.className = 'profile-banner';
          const bannerUrl = sanitizeBanner(profile.banner);
          if (bannerUrl) {
            banner.style.backgroundImage = `url("${bannerUrl}")`;
          }

          const content = document.createElement('div');
          content.className = 'profile-content';

          const main = document.createElement('div');
          main.className = 'profile-main';
          const avatar = document.createElement('img');
          avatar.className = 'avatar';
          avatar.alt = '';
          avatar.src = sanitizeAvatar(profile.avatar);
          avatar.onerror = () => {
            avatar.src = DEFAULT_AVATAR;
          };

          const info = document.createElement('div');
          const name = document.createElement('h4');
          name.textContent = profile.username || 'Người dùng';
          name.style.color = profile.color || '#22c55e';
          const statusLine = document.createElement('span');
          statusLine.className = 'profile-status';
          const statusDot = document.createElement('span');
          statusDot.className = `profile-status-dot ${profile.isOnline ? profileStatus : 'offline'}`;
          const statusText = document.createElement('span');
          statusText.textContent = profile.isAdmin
            ? 'Admin'
            : getPresenceText(profile);
          statusLine.append(statusDot, statusText);
          info.append(name, statusLine);
          main.append(avatar, info);

          const stats = document.createElement('div');
          stats.className = 'profile-stats';
          stats.append(
            profileStat(String(Number(profile.messageCount || 0)), 'Tin đã gửi'),
            profileStat(formatProfileDate(profile.createdAt), 'Tham gia'),
            profileStat(isBlockedUserId(profile.id) ? 'Đã chặn' : 'Bình thường', 'Trạng thái')
          );

          const bio = document.createElement('p');
          bio.className = 'profile-bio';
          bio.textContent = sanitizeBio(profile.bio) || 'Chưa có bio.';

          const actions = document.createElement('div');
          actions.className = 'profile-actions';
          if (Number(profile.id) !== Number(state.userId)) {
            const blockBtn = document.createElement('button');
            blockBtn.className = isBlockedUserId(profile.id) ? 'ghost-btn' : 'danger-btn';
            blockBtn.type = 'button';
            blockBtn.textContent = isBlockedUserId(profile.id) ? 'Bỏ chặn' : 'Chặn người này';
            blockBtn.addEventListener('click', () => toggleBlockedUser(profile));
            actions.appendChild(blockBtn);
          }

          content.append(main, stats, bio, actions);
          card.append(banner, content);
          body.appendChild(card);
        },
        read: () => ({ ok: true, value: true })
      });
    }

    function openImageViewer(message) {
      if (!message.imageUrl) return;
      openModal({
        kicker: 'Ảnh',
        title: message.imageName || 'Ảnh trong chat',
        subtitle: `Gửi bởi ${message.user || 'Người dùng'}`,
        confirmText: 'Đóng',
        hideCancel: true,
        large: true,
        build(body) {
          const image = document.createElement('img');
          image.className = 'image-viewer';
          image.alt = message.imageName || 'Ảnh trong chat';
          image.src = message.imageUrl;
          body.appendChild(image);
        },
        read: () => ({ ok: true, value: true })
      });
    }

    async function openGallery() {
      if (!state.socket || !state.authenticated) {
        showToast('Hãy đăng nhập trước khi xem gallery.');
        return;
      }

      const response = await emitWithAck('media:list', {});
      if (!response.ok) {
        showToast(response.error || 'Không tải được gallery.');
        return;
      }

      const mediaMessages = Array.isArray(response.messages)
        ? response.messages.filter((message) => message.imageUrl)
        : [];
      showGalleryModal(mediaMessages);
    }

    function showGalleryModal(mediaMessages) {
      let filterSelect;
      let grid;
      const senderOptions = buildGallerySenderOptions(mediaMessages);

      openModal({
        kicker: 'Gallery',
        title: 'Ảnh đã gửi',
        subtitle: `${mediaMessages.length} ảnh gần nhất trong chat`,
        confirmText: 'Đóng',
        hideCancel: true,
        large: true,
        build(body) {
          const tools = document.createElement('div');
          tools.className = 'gallery-tools';
          filterSelect = modalSelect(senderOptions, 'all');
          tools.append(
            modalField('Lọc theo người gửi', filterSelect),
            actionButton('Làm mới', async () => {
              closeModal(null);
              await openGallery();
            })
          );

          grid = document.createElement('div');
          grid.className = 'gallery-grid';
          filterSelect.addEventListener('change', () => renderGalleryGrid(grid, mediaMessages, filterSelect.value));

          body.append(tools, grid);
          renderGalleryGrid(grid, mediaMessages, filterSelect.value);
        },
        read: () => ({ ok: true, value: true })
      });
    }

    function buildGallerySenderOptions(messages) {
      const options = [{ value: 'all', label: 'Tất cả người gửi' }];
      const seen = new Set();
      for (const message of messages) {
        const userId = String(message.userId || '');
        if (!userId || seen.has(userId)) continue;
        seen.add(userId);
        options.push({
          value: userId,
          label: message.user || `User ${userId}`
        });
      }
      return options;
    }

    function renderGalleryGrid(grid, messages, selectedUserId) {
      grid.textContent = '';
      const filtered = selectedUserId === 'all'
        ? messages
        : messages.filter((message) => String(message.userId) === String(selectedUserId));

      if (!filtered.length) {
        const empty = document.createElement('div');
        empty.className = 'gallery-empty';
        empty.textContent = 'Chưa có ảnh phù hợp.';
        grid.appendChild(empty);
        return;
      }

      for (const message of filtered) {
        const item = document.createElement('button');
        item.type = 'button';
        item.className = 'gallery-item';
        const image = document.createElement('img');
        image.alt = message.imageName || 'Ảnh trong chat';
        image.src = message.imageUrl;
        image.loading = 'lazy';
        const sender = document.createElement('strong');
        sender.textContent = message.user || 'Người dùng';
        const time = document.createElement('span');
        time.textContent = formatTime(message.createdAt);
        item.append(image, sender, time);
        item.addEventListener('click', () => openImageViewer(message));
        grid.appendChild(item);
      }
    }

    function profileStat(value, label) {
      const item = document.createElement('div');
      item.className = 'profile-stat';
      const strong = document.createElement('strong');
      strong.textContent = value || '-';
      const span = document.createElement('span');
      span.textContent = label;
      item.append(strong, span);
      return item;
    }

    async function openEditHistory(message) {
      if (!state.socket || !state.authenticated) return;

      const response = await emitWithAck('message:editHistory', message.id);
      if (!response.ok) {
        showToast(response.error || 'Không xem được lịch sử chỉnh sửa.');
        return;
      }

      const edits = Array.isArray(response.edits) ? response.edits : [];
      if (!edits.length) {
        showToast('Tin nhắn này chưa có lịch sử chỉnh sửa.');
        return;
      }

      openModal({
        kicker: 'Tin nhắn',
        title: 'Lịch sử chỉnh sửa',
        subtitle: `${edits.length} lần chỉnh sửa đã lưu`,
        confirmText: 'Đóng',
        hideCancel: true,
        large: true,
        build(body) {
          const list = document.createElement('div');
          list.className = 'edit-history';

          for (const edit of edits) {
            const item = document.createElement('article');
            item.className = 'edit-entry';

            const time = document.createElement('strong');
            time.textContent = formatTime(edit.editedAt);

            const oldLabel = document.createElement('span');
            oldLabel.className = 'profile-sub';
            oldLabel.textContent = 'Trước';
            const oldText = document.createElement('pre');
            oldText.textContent = edit.oldText || '';

            const newLabel = document.createElement('span');
            newLabel.className = 'profile-sub';
            newLabel.textContent = 'Sau';
            const newText = document.createElement('pre');
            newText.textContent = edit.newText || '';

            item.append(time, oldLabel, oldText, newLabel, newText);
            list.appendChild(item);
          }

          body.appendChild(list);
        },
        read: () => ({ ok: true, value: true })
      });
    }

    async function editMessage(message) {
      let textInput;
      const nextText = await openModal({
        kicker: 'Tin nhắn',
        title: 'Sửa tin nhắn',
        subtitle: 'Nội dung mới sẽ hiển thị cho tất cả mọi người.',

    function renderUsers(users = []) {
      state.lastUsers = users;
      els.users.textContent = '';
      const fragment = document.createDocumentFragment();

      for (const user of users) {
        state.profileCache.set(Number(user.userId), {
          ...(state.profileCache.get(Number(user.userId)) || {}),
          id: user.userId,
          username: user.name,
          color: user.color,
          avatar: user.avatar,
          banner: user.banner,
          bio: user.bio,
          status: normalizeStatus(user.status),
          lastActiveAt: user.lastActiveAt || null,
          mutedUntil: user.mutedUntil || null,
          isOnline: normalizeStatus(user.status) !== 'offline',
          isAdmin: user.isAdmin
        });

        if (Number(user.userId) === Number(state.userId)) {
          state.status = normalizeStatus(user.status);
          state.lastActiveAt = user.lastActiveAt || state.lastActiveAt;

          els.profileSub.textContent = state.isAdmin ? `Admin · ${getOwnStatusLabel()}` : getOwnStatusLabel();

          avatar.src = DEFAULT_AVATAR;
        };

        const info = document.createElement('div');
        info.className = 'user-info profile-trigger';
        const name = document.createElement('div');

        presence.className = 'user-presence';
        const dot = document.createElement('span');
        dot.className = `presence-dot ${normalizeStatus(user.status)}`;

    function renderTyping(users = []) {
      const names = users
        .filter((user) => user.name && user.name !== state.username)
        .map((user) => user.name);

      if (!names.length) {
        els.typing.textContent = '';
      } else if (names.length === 1) {
        els.typing.textContent = `${names[0]} đang nhập...`;
      } else {
        els.typing.textContent = `${names.slice(0, 2).join(', ')} đang nhập...`;
      }
    }

    function handleInput() {
      autoGrowInput();
      updateCharCount();
      saveDraft();
      if (!state.socket || !state.username) return;

      state.socket.emit('typing', els.input.value.trim() ? state.username : null);
      clearTimeout(state.typingTimer);
      state.typingTimer = setTimeout(() => {
        state.socket.emit('typing', null);
      }, 1200);
    }

    function handleComposerKeydown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        els.form.requestSubmit();
      }
    }

    function autoGrowInput() {
      els.input.style.height = 'auto';
      els.input.style.height = `${Math.min(els.input.scrollHeight, 140)}px`;
    }

    function updateCharCount() {
      els.charCount.textContent = `${els.input.value.length}/${state.maxMessageLength}`;
    }

    function saveDraft() {
      if (!state.authenticated) return;
      const text = els.input.value;
      try {
        if (text) {
          localStorage.setItem(getDraftKey(), JSON.stringify({
            text: text.slice(0, state.maxMessageLength),
            updatedAt: Date.now()
          }));
        } else {
          localStorage.removeItem(getDraftKey());
        }
      } catch {
        // localStorage can be unavailable in private browsing modes.
      }
    }

    function restoreDraft() {
      try {
        const draft = JSON.parse(localStorage.getItem(getDraftKey()) || '{}');
        if (!draft.text || els.input.value) return;
        els.input.value = String(draft.text).slice(0, state.maxMessageLength);
        autoGrowInput();
        updateCharCount();
      } catch {
        try {
          localStorage.removeItem(getDraftKey());
        } catch {
          // Ignore storage cleanup failures.
        }
      }
    }

    function clearDraft() {
      try {
        localStorage.removeItem(getDraftKey());
      } catch {
        // Ignore storage cleanup failures.
      }
    }

    function getDraftKey() {
      return `${DRAFT_KEY}:${state.userId || 'guest'}`;
    }

    function insertAtCursor(value) {
      const start = els.input.selectionStart || 0;
      const end = els.input.selectionEnd || 0;
      const text = els.input.value;
      els.input.value = `${text.slice(0, start)}${value}${text.slice(end)}`.slice(0, state.maxMessageLength);
      const nextPos = Math.min(start + value.length, els.input.value.length);
      els.input.focus();
      els.input.setSelectionRange(nextPos, nextPos);
      handleInput();
    }

    function updateConnection(online) {
      els.statusDot.classList.toggle('online', online);
      els.connectionStatus.textContent = online ? 'Đã kết nối' : 'Mất kết nối';
      els.sendBtn.disabled = !online;
    }

    function setSendState(text) {
      els.sendState.textContent = text;
    }

    function isNearBottom() {
      const distance = els.messages.scrollHeight - els.messages.scrollTop - els.messages.clientHeight;
      return distance < 120;
    }

    function markUnreadMessage(message) {
      if (!state.unreadStartId) {
        state.unreadStartId = message.id;
      }
      state.unreadCount += 1;
      updateUnreadIndicator();
    }

    function resetUnreadMessages() {
      if (!state.unreadCount && !state.unreadStartId) return;
      state.unreadStartId = null;
      state.unreadCount = 0;
      updateUnreadIndicator();
    }

    function updateUnreadIndicator() {
      const hasUnread = state.unreadCount > 0;
      els.jumpBtn.classList.toggle('has-badge', hasUnread);
      els.jumpBtn.textContent = hasUnread ? `${state.unreadCount} mới` : '↓';
      els.jumpBtn.title = hasUnread ? 'Xem tin mới' : 'Tin mới';
    }

    function jumpToLatestMessages() {
      scrollToBottom(true);
      resetUnreadMessages();
    }

    function scrollToBottom(smooth) {
      els.messages.scrollTo({
        top: els.messages.scrollHeight,
        behavior: smooth ? 'smooth' : 'auto'
      });
    }

    function getPresenceText(user = {}) {
      const status = normalizeStatus(user.status);
      if (user.isAdmin && status === 'active') return 'Admin đang hoạt động';
      if (user.isOnline || user.userId) {
        return STATUS_LABELS[status] || STATUS_LABELS.active;
      }
      if (status === 'offline') return STATUS_LABELS.offline;
      if (status === 'invisible' && Number(user.id) === Number(state.userId)) return STATUS_LABELS.invisible;
      return formatLastActive(user.lastActiveAt);
    }

    function formatLastActive(value) {
      const timestamp = value ? Date.parse(value) : 0;
      if (!Number.isFinite(timestamp) || timestamp <= 0) return 'Chưa rõ lần online cuối';

      const diffMs = Math.max(0, Date.now() - timestamp);
      const minute = 60 * 1000;
      const hour = 60 * minute;
      const day = 24 * hour;

      if (diffMs < minute) return 'Vừa online';
      if (diffMs < hour) return `Vừa online ${Math.floor(diffMs / minute)} phút trước`;
      if (diffMs < day) return `Vừa online ${Math.floor(diffMs / hour)} giờ trước`;
      return `Vừa online ${Math.floor(diffMs / day)} ngày trước`;
    }

    function formatTime(value) {
      const date = value ? new Date(value) : new Date();
      if (Number.isNaN(date.getTime())) return '';

      const today = new Date().toLocaleDateString('vi-VN');
      const messageDay = date.toLocaleDateString('vi-VN');
      const day = today === messageDay ? 'Hôm nay' : messageDay;
      const time = date.toLocaleTimeString('vi-VN', {
        hour: '2-digit',
        minute: '2-digit'
      });
      return `${day} ${time}`;
    }

    function formatProfileDate(value) {
      const date = value ? new Date(value) : null;
      if (!date || Number.isNaN(date.getTime())) return '-';
      return date.toLocaleDateString('vi-VN', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric'
      });
    }

    function applyTheme() {
      document.body.dataset.theme = state.theme;
      const theme = THEMES.find((item) => item.id === state.theme) || THEMES[0];
      els.themeBtn.textContent = `Theme: ${theme.label}`;
    }

    async function openThemeMarketplace() {
      let selectedTheme = state.theme;
      const result = await openModal({
        kicker: 'Theme',
        title: 'Theme marketplace',
        subtitle: 'Chọn giao diện theo phong cách bạn thích.',
        confirmText: 'Áp dụng',
        large: true,
        build(body) {
          const grid = document.createElement('div');
          grid.className = 'theme-grid';
          for (const theme of THEMES) {
            const card = document.createElement('button');
            card.type = 'button';
            card.className = `theme-card${theme.id === selectedTheme ? ' active' : ''}`;
            card.dataset.theme = theme.id;

            const swatch = document.createElement('div');
            swatch.className = 'theme-swatch';
            for (const color of theme.colors) {
              const colorBlock = document.createElement('span');
              colorBlock.style.background = color;
              swatch.appendChild(colorBlock);
            }

            const title = document.createElement('strong');
            title.textContent = theme.label;
            const note = document.createElement('span');
            note.textContent = theme.note;
            card.append(swatch, title, note);
            card.addEventListener('click', () => {
              selectedTheme = theme.id;
              for (const item of grid.querySelectorAll('.theme-card')) {
                item.classList.toggle('active', item.dataset.theme === selectedTheme);
              }
            });
            grid.appendChild(card);
          }
          body.appendChild(grid);

        read: () => ({ ok: true, value: selectedTheme })
      });

      if (!result) return;
      state.theme = THEME_IDS.has(result) ? result : 'dark';
      localStorage.setItem('chat:theme', state.theme);
      applyTheme();
    }

    function showToast(text) {
      els.toast.textContent = text;
      els.toast.classList.remove('hidden');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        els.toast.classList.add('hidden');
      }, 3200);
    }
  </script>
</body>

</html>
